services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LAB_MODE=true
      - DATABASE_URL=postgresql://securethecloud:securethecloud@postgres:5432/ai_control_plane
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: securethecloud
      POSTGRES_PASSWORD: securethecloud
      POSTGRES_DB: ai_control_plane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
